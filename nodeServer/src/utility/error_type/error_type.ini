[need_switch_api]
; 这些错误需要切换到其他 API key
model_not_found=true
rate_limit=true
invalid_api_key=true
channel_unavailable=true
channel_disabled=true
network_error=true

[retryable]
; 这些错误可以重试，不需要切换 API
timeout=true
server_error=true
corrupted_thought=true
ECONNRESET=true
ECONNREFUSED=true
ENOTFOUND=true

[error_codes]
; HTTP 状态码对应的错误类型
429=rate_limit
401=invalid_api_key
403=channel_disabled
404=model_not_found
503=channel_unavailable
504=timeout

[error_messages]
; 错误消息关键词映射
model_not_found=No available channel for model
rate_limit=rate limit
invalid_api_key=invalid api key
channel_unavailable=channel unavailable
channel_disabled=渠道已被禁用
corrupted_thought=corrupted thought signature
